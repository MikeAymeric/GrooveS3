<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <!-- step-sequencer icon -->
  <rect x="30" y="40" width="80" height="80" rx="12" fill="none" stroke="#ffffff" stroke-width="2"/>
  <g>
    <!-- row 1 -->
    <rect x="42" y="52" width="11" height="11" rx="2" fill="#ffffff"/>
    <rect x="57" y="52" width="11" height="11" rx="2" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="72" y="52" width="11" height="11" rx="2" fill="#ffffff"/>
    <rect x="87" y="52" width="11" height="11" rx="2" fill="#ffffff" fill-opacity="0.25"/>
    <!-- row 2 -->
    <rect x="42" y="67" width="11" height="11" rx="2" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="57" y="67" width="11" height="11" rx="2" fill="#ffffff"/>
    <rect x="72" y="67" width="11" height="11" rx="2" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="87" y="67" width="11" height="11" rx="2" fill="#ffffff"/>
    <!-- row 3 -->
    <rect x="42" y="82" width="11" height="11" rx="2" fill="#ffffff"/>
    <rect x="57" y="82" width="11" height="11" rx="2" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="72" y="82" width="11" height="11" rx="2" fill="#ffffff"/>
    <rect x="87" y="82" width="11" height="11" rx="2" fill="#ffffff" fill-opacity="0.25"/>
    <!-- row 4 -->
    <rect x="42" y="97" width="11" height="11" rx="2" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="57" y="97" width="11" height="11" rx="2" fill="#ffffff"/>
    <rect x="72" y="97" width="11" height="11" rx="2" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="87" y="97" width="11" height="11" rx="2" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="130" y="98" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800" fill="#ffffff">GrooveS3</text>
  <text x="132" y="122" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="600" letter-spacing="3" fill="#ffffff" fill-opacity="0.6">STEP SEQUENCER · ESP32-S3</text>
</svg>
