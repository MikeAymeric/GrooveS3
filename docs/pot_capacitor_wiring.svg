<svg xmlns="http://www.w3.org/2000/svg" width="900" height="670" viewBox="0 0 900 670" font-family="Consolas,Menlo,monospace">
<rect width="900" height="670" fill="#ffffff"/>
<text x="30" y="40" font-size="24" font-weight="bold" fill="#111">GrooveS3 — Potenziometro + condensatore anti-rumore</text>
<text x="30" y="66" font-size="15" fill="#444">(schema identico per tutti e 4 i POT1-4, GPIO 1-4)</text>
<rect x="300" y="180" width="220" height="90" rx="10" fill="#f2f2f2" stroke="#333" stroke-width="2.5"/>
<text x="410" y="220" font-size="16" fill="#111" text-anchor="middle" font-weight="bold">POT (Alpha RD901F 10kΩ)</text>
<line x1="410" y1="270" x2="385" y2="210" stroke="#333" stroke-width="2"/>
<polygon points="385,210 395,218 380,225" fill="#333"/>
<circle cx="300" cy="225" r="5" fill="#c62828"/>
<line x1="300" y1="225" x2="160" y2="225" stroke="#c62828" stroke-width="3"/>
<text x="150" y="230" font-size="16" fill="#c62828" text-anchor="end" font-weight="bold">3.3V</text>
<text x="260" y="211" font-size="12" fill="#555" text-anchor="middle" font-weight="normal">terminale CW</text>
<circle cx="520" cy="225" r="5" fill="#000"/>
<line x1="520" y1="225" x2="660" y2="225" stroke="#000" stroke-width="3"/>
<text x="670" y="230" font-size="16" fill="#000" text-anchor="start" font-weight="bold">GND</text>
<text x="560" y="211" font-size="12" fill="#555" text-anchor="middle" font-weight="normal">terminale CCW</text>
<circle cx="410" cy="270" r="5" fill="#111"/>
<line x1="410" y1="270" x2="410" y2="400" stroke="#1565c0" stroke-width="3"/>
<circle cx="410" cy="400" r="5" fill="#1565c0"/>
<text x="420" y="290" font-size="12" fill="#555" text-anchor="start" font-weight="normal">wiper</text>
<line x1="410" y1="400" x2="700" y2="400" stroke="#1565c0" stroke-width="3"/>
<circle cx="700" cy="400" r="5" fill="#1565c0"/>
<text x="715" y="405" font-size="16" fill="#1565c0" text-anchor="start" font-weight="bold">GPIO 1-4 (ADC1)</text>
<line x1="410" y1="400" x2="410" y2="440" stroke="#1565c0" stroke-width="3"/>
<line x1="392" y1="440" x2="428" y2="440" stroke="#333" stroke-width="3"/>
<line x1="392" y1="456" x2="428" y2="456" stroke="#333" stroke-width="3"/>
<line x1="410" y1="456" x2="410" y2="496" stroke="#000" stroke-width="3"/>
<circle cx="410" cy="496" r="5" fill="#111"/>
<line x1="410" y1="496" x2="550" y2="496" stroke="#000" stroke-width="3"/>
<text x="560" y="501" font-size="16" fill="#000" text-anchor="start" font-weight="bold">GND</text>
<text x="440" y="453" font-size="15" fill="#333" text-anchor="start" font-weight="normal">C = 100 nF ceramico (0.1µF)</text>
<text x="440" y="472" font-size="12" fill="#666" text-anchor="start" font-weight="normal">non polarizzato, nessun verso</text>
<rect x="30" y="520" width="840" height="120" rx="8" fill="#fff8e1" stroke="#c78d00" stroke-width="1.5"/>
<text x="46" y="548" font-size="15" fill="#7a5200" text-anchor="start" font-weight="bold">Note pratiche:</text>
<text x="46" y="572" font-size="14" fill="#333" text-anchor="start" font-weight="normal">- Il condensatore va tra il pin wiper e GND, il più vicino possibile al GPIO (poche mm sul filo/breadboard).</text>
<text x="46" y="592" font-size="14" fill="#333" text-anchor="start" font-weight="normal">- Non serve resistore in serie: il potenziometro stesso fa da resistenza dell'RC filter.</text>
<text x="46" y="612" font-size="14" fill="#333" text-anchor="start" font-weight="normal">- Ceramico multistrato (es. X7R), non elettrolitico: nessuna polarità da rispettare.</text>
<text x="46" y="632" font-size="14" fill="#333" text-anchor="start" font-weight="normal">- Ripetere identico sui 4 pot (GPIO 1,2,3,4) — ognuno con il proprio condensatore.</text>
</svg>